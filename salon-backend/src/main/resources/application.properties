spring.application.name=salon-backend

# Database — dùng biến môi trường khi deploy, fallback về XAMPP khi dev local
spring.datasource.url=${DATABASE_URL:jdbc:mysql://trolley.proxy.rlwy.net:40349/railway?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASS:jRTKLpHvwvWijqyBvCERiglKaOemGedg}
# Connection pool — giữ sẵn connection, giảm delay
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Port — Render tự set PORT
server.port=${PORT:8080}

# CORS — cho phép cả local và production
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.mvc.static-path-pattern=/uploads/**
